<!DOCTYPE html>
<html>
<head>
<title>PWA ECS - Surface-Stable Dithering With Vite</title>
<link rel="shortcut icon" type="image/png" href="%BASE_URL%icons/icon_192x192.png">
<link rel="canonical" href="https://dilsency.github.io/ThreeJS-PWA-npm-Vite-Surface-Stable-Dithering/" />
<link rel="manifest" href="%BASE_URL%manifest.json" crossorigin="use-credentials">
<style>
html,body,canvas#canvas{margin:0;background-color:#606000;}
html,body{height:100%;}
canvas#canvas{width:100% !important;height:100% !important;display:block !important;}
</style>
<script lang="javascript">
    if ("serviceWorker" in navigator) {
          navigator.serviceWorker
            .register("./sw.js")
            .then(function (registration) {
              // Registration was successful
              console.log(
                "ServiceWorker registration successful with scope: ",
                registration.scope
              );
            })
            .catch(function (err) {
              // registration failed :(
              console.log("ServiceWorker registration failed: ", err);
            });
        }

        window.addEventListener("beforeinstallprompt", function (e) {
          e.userChoice.then(function (choiceResult) {
            console.log(choiceResult.outcome);
            if (choiceResult.outcome == "dismissed") {
              console.log("User cancelled home screen install");
            } else {
              console.log("User added to home screen");
            }
          });
        });
</script>
</head>
<body>
<script type="module" src="main.js"></script>
</body>
</html>
