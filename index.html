<!--
  Import map kept for non-bundled deployments (e.g. when serving static files
  directly or deploying to GitHub Pages without a bundler). We also use Vite
  during development and build; Vite does not use the browser importmap and
  resolves bare imports itself. To ensure the same bare-specifier imports work
  in Vite dev, we added equivalent aliases in .vite/vite.config.js.

  Alternative considered:
  - Replace all bare imports with explicit relative imports (e.g.
    import {Entity} from "./classes/ECS/entity.js"). That approach eliminates
    the need for both the importmap and Vite aliases and is the most portable
    option (works with and without bundlers). We left the importmap in place
    to preserve compatibility with non-bundled deployments and to keep the
    current code unchanged for easy testing.
-->

<script lang="javascript">
    if ("serviceWorker" in navigator) {
          navigator.serviceWorker
            .register("./sw.js")
            .then(function (registration) {
              // Registration was successful
              console.log(
                "ServiceWorker registration successful with scope: ",
                registration.scope
              );
            })
            .catch(function (err) {
              // registration failed :(
              console.log("ServiceWorker registration failed: ", err);
            });
        }

        window.addEventListener("beforeinstallprompt", function (e) {
          e.userChoice.then(function (choiceResult) {
            console.log(choiceResult.outcome);
            if (choiceResult.outcome == "dismissed") {
              console.log("User cancelled home screen install");
            } else {
              console.log("User added to home screen");
            }
          });
        });
</script>
